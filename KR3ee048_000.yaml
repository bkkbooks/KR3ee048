body:
  text: 環周圖說難第一環十干主日環周一圖內外有四環第一環用天干十字分析地之五運為五陰五陽五陰分合於五臟五陽分合於五府餘三焦一府名曰孤府甲日陽木合膽府乙日陰木合肝臟丙日陽火合小腸丁日陰火合心臟戊合胃陽土己合脾陰土庚辛金合大腸與肺壬癸水合腎與膀胱孤府三焦無所合決瀆之官附屬於膀胱此第一環十日天干之大分也第二環腧穴流注第三環干支定時第二環第三環細分一日為十二時起於子終於亥上冠以天干十字十日共一百二十時地支用十次天干用十二次甲己之日同起甲子乙庚之日同起丙子丙辛日起戊子丁壬起庚子戊癸起壬子照次序推之甲日十二時重見甲為戍時故開膽井竅陰穴甲為陽木膽府亦屬木之陽也癸日十二時重見癸為亥時故開腎井湧泉穴癸為陰水腎臟亦屬水之陰也或問癸日缺十時腎不開丑時而移開亥時何也蓋腎者主水為人身立命之根注重生木如不能轉注於甲日則流而不注不合乎陰陽相生之道也以此例推之乙日乙酉時開肝井大敦穴乙為陰木肝亦陰藏之屬木也丙日丙申時丁日丁未時陽火陰火則開小腸井少澤心井少衝戊日戊午時己日已巳時則開胃井厲兌脾井隱白戊陽土己陰土也庚日辰時開商陽辛日卯時開少商大腸陽金肺藏陰之金也壬為陽水壬寅時開膀胱水府之至陰井穴轉注癸日壬子時壬重見壬成為十日一大周井穴通用紅字表示每日旺氣主穴之起點過穴亦書紅字蓋本藏之俞本府之原與流而注者不同也何謂流陽日開陽時陽穴依相生次序仍流在陽日陽時之謂也何謂注陽日陽時取穴不足則轉注而取陰日之陽時反言之陰日陰時取穴不足則轉注而取陽日之陰時均謂之注流與注不同注與過不同陽日之末氣納三焦陰日之末血歸包絡取生我者我生者亦各不同試舉一甲日分析言之甲日戌時開膽井竅陰其在戌時前酉未巳卯醜五陰時所列中衝尺澤商丘神門行間各藏陰穴皆由前癸陰日依木火土金水相生之次序轉注而來甲日重見甲至戌時僅開竅陰一穴甲為陽日開陽時亥為陰時不取轉注到乙日丙子陽時開小腸滎穴前谷蓋甲膽屬木丙小腸屬火膽開第一穴而轉溜於小腸之第二穴木生火也陽井竅陰屬金陽滎前谷屬水又金水相生之義也再注到乙日戊寅時則開胃之俞穴曰陷谷小腸馬火胃屬土火生土也並過丘墟一穴因六腑六腧各多一原穴超出五行相生之外故並過於俞位反求其本與竅陰一脈相承並過於此列於下位以其非五行相生之正經也用紅書一過字表示有所本也乙日庚辰時注大腸陽溪穴壬午時注膀胱委中穴言其府則大腸屬金膀胱屬水金水相生言其穴則陽經火陽俞土火生土也末甲申時復列三焦滎穴液門蓋三焦孤府六腧無所寄故分列於各府開穴之最末獨取一滎者陽滎為水穴膽為木府水能生木也甲日始戌時終於乙日申時凡十一時六腑各開一穴膽居主位多過一原穴凡七穴此甲日流注細分之理也其餘九日環周流注臟各五腧腑各六腧腑為陽臟為陰陽井金陰井木各依相生之次序流注展轉而取之腑過一原穴臟以俞代原而過之末一穴陽日氣納三焦取生我者陰日血歸包絡取我生者均詳列前圖一見而知不贅也第四環同宗錯落天干十字地支十二字一日十二時五日六十時十日一百二十時地支十二字每日用一次五日五次十日十次與天干十字配合用之五日六十時地支用五次天干當用六次甲子小周五日一候六日又另起甲子時與一日同此一六同宗甲己同宗之義也甲日己日一奇一偶一陰一陽日乾陰陽雖不同時干支全同故甲日流注諸穴交落列於己日時干支之下己日流注諸穴轉交落列於甲日時干支之下以此推之二七為乙庚三八為丙辛四九為丁壬五十為戊癸皆一陰一陽之同宗故流注各穴除一過穴不交落余均互相交錯落列於下環依時取之其效一也
