body:
  text: 下卷五臟五腧六腑六腧釋義腧是穴位能轉註他穴凡節之交一三百六十五會五臟所以稟三百六十五節氣味二乃水穀之氣化為氣血自內而外由外而內迴環相通蓋天之六元三之氣補益人體五臟則為本輸四地之五味五補益人體六腑則為府腧六臟之氣合於腑自內相合府之精輸於臟由手足之原穴而轉註故五臟之俞即原穴六腑水穀之精華貫入五臟俞穴之起原處靈樞第一篇九針十二原乃大淵大陵太衝太白太谿左右計十原增鳩尾脖胦曰膏曰肓概括六腑所出之要穴共稱十二原五臟五腧所出為井木六腑六腧所出為井金天一生水七木上之水乃金之所生積陽為天天生萬物故陽井為金積陰為地水為陰水能生木故陰井為木以四時證之冬月水旺春月木旺木上之露其色青自根而達於枝葉木根於地地下有水則木繁榮故曰水生木故陰井為木秋月金旺木上之露其色白自葉溜根秋後枝葉雖枯槁而蒂固根深金生水故陽井為金蓋秋金之氣抑制其木之枝葉增益其地下之水分此五運八相推行之次序井金井木既定則依五運流注之陰井為木陰滎為火陰俞為土陰經為金陰合為水陽井為金陽滎為水陽俞為木陽原陽經為火陽合為土出為井溜為滎注為俞過為原行為經入為合五臟五腧六腑六腧各行其道故曰五腧之所留五臟無原六腑精華注入五臟之俞故以俞為原此六腑之所與合至於人體有病依經穴旺時取之甲丙戊庚壬開府之井穴乙丁己辛癸開藏之井穴陽日陽時開陽穴陰日陰時開陰穴均間時一取之陽日流注到陰日仍開陽穴陰日流注到陽日仍開陰穴各依相生之次序每日十一時共開六穴陽日氣納三焦九六腑皆備陰日血歸包絡九五臟悉通此所謂五臟之所溜處邪氣之來實則瀉之多瀉其子試舉四時以為例春取絡脈諸滎大筋分肉之間木旺於春滎為火穴木能生火取諸滎乃瀉其子病甚者深取之病間者淺取之下云如春法亦即此義夏取諸俞俞為土穴夏日火旺取諸俞乃瀉其子秋取諸合余如春法蓋取其子仍有甚間之分詳見於前冬取諸井水生木冬日水旺取諸井亦瀉其子此四時之常例詳推其變邪氣病人尤多克我如土氣旺則水受其克當瀉其土穴針深而留之故冬取諸井兼取諸俞蓋井穴過淺只適宜於間十者淺刺速入速出如冬病之甚者須深針而留之指間井穴不足取當取諸俞之分十一五臟各有五腧五五二十五腧六腑各有六腧六六三十六腧共六十一穴扁鵲子午經便於流注干支之推算增心本臟五穴共為六十六穴陽日陰日依各臟各腑相生之次序取之間時一穴木火土金水與金水木火士五腧得五時中間四時共為九時陽日增三焦一穴取其生我者十二陰日增包絡一穴取其我生者十二一日六穴計六時間五時合十一時十日共一百十時始於癸日亥時終於癸日子時歷甲乙丙丁戊己庚辛壬其間缺癸日十時此流注中天然之缺點天之十干十三下合地之五運地之十二支十四上應天之六元甲乙木丙丁火戊己土庚辛金壬癸水陽奇陰偶六腑為陽五臟為陰甲膽為陽木乙肝為陰木丙小腸為陽火丁心為陰火戊胃為陽土己脾為陰土庚大腸為陽金辛肺為陰金壬膀胱為陽水癸腎為陰水依各臟各腑十日環周之次序其中尤有陰陽交錯之至理者蓋五運之始為土土為四象之母依次以生之土生金金生水水生木木生火火生土一日一字甲與己合同宗化土乙庚化金丙辛化水丁壬化木戊癸化火奇偶雖不同而五日中六十時時干支恰一周吾國造甲子始六十年一大周年五年中有六十月而周月五日內有六十時而周時五運六氣古今哲學年年歲歲不同日日時時亦各不同然甲己同宗則陰陽奇偶交相錯落故甲日開穴重出於己日之下己日開穴又重見於甲日之下乙庚丙辛丁壬戊癸八日亦互相交流同一義理終始根結釋義凡用針者必通十二經脈之所終始營衛偕行二十八脈此其常例外邪病人奇邪離經陰經典陽經各別則各有根結各有終始陰經陽經不同手經足經各異用針者應重足不重手蓋陰者主臟陽者主腑足三陰三陽接近於臟腑手三陰三陽之脈度不接近於臟腑但補瀉迎隨和氣之方必通陰陽臟腑故根結偏重在足然脈會大淵陰陽之有餘或不足又當從手診脈蓋人迎主三陽脈口主三陰人迎一盛一盛三盛病在少陽太陽陽明脈口一盛二盛三盛病在厥陰少陰太陰人迎脈口較平人俱盛三倍以上名曰陰陽俱溢一當以開十宣之法疾瀉之不開則血脈閉塞氣無所行流淫而傷五臟危證也如四倍以上左為外格一右為內關一內關不通死不治人迎脈口較平人俱盛四倍以上者名曰關格與之短期蓋陰陽離絕生氣已竭之死證也其人迎一盛於脈口者病在足少陽一盛而躁者病在手少陽用針者皆瀉足少陽而補足厥陰二瀉一補日一取之其人迎二盛於脈口者病在足太陽二盛而躁者病在手太陽用針者皆瀉足太陽而補足少陰二瀉一補二日一取之其人迎三盛於脈口者病在足陽明三盛而躁者病在手陽明用針者皆瀉足陽明而補足太陰二瀉一補日二取之其脈口一盛於人迎者病在足厥陰一盛而躁者病在手厥陰用針者皆瀉足厥陰而補足少陽二補一瀉日一取之其脈口二盛於人迎者病在足少陰二盛而躁者病在手少陰用針者皆瀉足少陰而補足太陽二補一瀉二日一取之其脈口三盛於人迎者病在足太陰三盛而躁者病在手太陰用針者皆瀉足太陰而補足陽明二補一瀉日二取之刺道畢於終始終始之道有常有變經脈十二始於手太陰肺終於足厥陰肝脈度二十有八男子始於左手太陰肺終於督任兩陽蹺女子始於右手太陰肺終於任督兩陰蹺此經脈終始之常外有經正經別六合不在其中皆人身生理之常其有病變者則三陰三陽各有終始各有根結推而言之尤有根而不結者散於絡別而倒行會於項中始於任而終於督七次八穴十四行二尚未盡也此根而不結之變例一太陽根於至陰結於命門睛明穴二陽明根於厲兌結於顙大頭維穴三少陽根於竅陰結於窗籠聽宮穴四太陰根於隱白結於太倉中腕穴五少陰根於湧泉結於廉泉舌本穴六厥陰根於大敦結於玉英玉堂穴以上六者有根有結重足不重手蓋足三陰三陽之井穴皆在足下故也一足太陽根於至陰溜於京骨注於崑崙入於天柱六次脈飛陽也二足少陽根於竅陰溜於丘虛注於陽輔入於天容四次脈光明也三足陽明根於厲兌溜於衝陽注於下陵入於人迎一次脈豐隆也四手太陽根於少澤溜於陽谷注於小海入於天窗三次脈支正也五手少陽根於關衝溜於陽池注於支溝入於天牖五次脈外關也六手陽明根於商陽溜於合谷注於陽谿入於扶突二次脈偏歷也以上六者手足三陽之別絡也根而無結重陽不重陰蓋手之三陰從胸走手不上於頭故不計也補瀉手法凡用補瀉正法必先明晰人身偕行營衛一左右陰陽內外上下經脈運行之道路一男子午前左手陰經降從胸走手左手陽經升從手走頭右手陽經降從頭走手右手陰經升從手走胸右足陰經降從胸走足右足陽經升從足走頭左足陽經降從頭走足左足陰經升從足走胸二男子午後右手陰經降從胸走手右手陽經升從手走頭左手陽經降從頭走手左手陰經升從手走胸左足陰經降從胸走足左足陽經升從足走頭右足陽經降從頭走足右足陰經升從足走胸三午前瀉針手法男女不同針男子左手足針向內轉二令病人用口鼻吸氣針手用鼻吸氣針足用口吸氣陽日用奇數三七九數分病輕重用之陰日用偶數二六八數分病輕重用之針女子右手足針向外轉二令病人用口鼻呼氣針手用鼻呼氣針足用口呼氣陽用奇陰用偶三何謂陽日甲丙戊庚壬何謂陰日乙丁己辛癸四午前補針手法男女不同針男子左手足針向外轉令病人用口鼻呼氣針手用鼻針足用口陽偶陰奇三針女子右手足針向內轉令病人用口鼻吸氣針手用鼻針足用口陽偶陰奇五午後瀉針手法男女不同針男子左手足用針女子午前瀉針手法左右雖不同而手法針外轉呼氣則同針女子右手足用針男子午前瀉針手法左右雖不同而手法針內轉吸氣則同六午後補針手法男女不同針男子左手足用針女子午前補針手法左右雖不同而針內轉吸氣則同針女子右手足用針男子午前補針手法左右雖不同而針外轉呼氣則同七以上所言乃男女子後午前午後子前之正例即靈樞經所謂男內女外堅拒勿出謹守勿內之正義又云迎而奪之者瀉也隨而繼之者補也迎之隨之以意合之針道畢矣八總其大要男子午前針內轉吸氣為瀉針外轉呼氣為補男子午前與午後相反女子午後與男子午前相同女子午前與男子午前相反不可不辨寒熱手法靈樞經云刺諸熱者如以手探湯一刺寒清者如人不欲行一此即繼起者用透天涼燒山火之兩手法針灸家師承有云提針為熱插針為寒內轉為瀉外轉為補補瀉之法可停針候氣遲遲轉之提插之法不可偏用蓋儘量插之而至於骨則不可再插儘量提之而針以外出則不能再用故定為三提一插提針呼氣插針吸氣為燒山火蓋提數多則氣之出於衛分者多振振惡寒二之證用此手法陽日用偶數陰日用奇數必能使之發熱反言之三插一提插針吸氣提針呼氣為透天涼蓋插數多則氣之入於營分者多蒸蒸發熱二之證用此手法陽日用奇數陰日用偶數必能使其熱退除寒退熱乃針灸家必要之手法故靈樞針經列於第一篇九針十二原之末等於冠諸本輸篇之首也以上所言燒山火透天涼之正法乃男用於午前女子用於午後如男子午後有大寒證大熱證當用燒山火透天涼者則反而用之如女子午前有大寒證大熱證當用燒山火透天涼者亦反而用之歌曰三插一提涼透天三提一插火燒山提針吹氣插針吸女午後兮男午前升降手法五運有太過與不及五氣傾移有常有變卒然而動者謂之變順應四時陰陽往復寒暑迎隨謂之常依時取穴合乎運常但不能應變內經氣交變大論篇云應常不應卒此之謂也故刺法論中之升降手法欲發鬱而升之者均須待時如當折其勝散其鬱而降之者勿須待時一試分析如後五臟藏氣上升之法肝木之氣鬱而不升當刺足厥陰之井大敦乙庚日酉時開心火之氣鬱而不升當刺包絡之滎勞宮丙辛日未時開脾土之氣鬱而不升當刺足太陰之俞太白丙辛日丑時開己日酉時過肺金之氣鬱而不升當刺手太陰之經經渠丙辛日卯時開腎水之氣鬱而不升當刺足少陰之合陰谷丙辛日巳時開以上所言上升取穴須待時之正例欲氣上行則用右手大指甲上括針柄左手指依經導之使氣上行續用補法或多補少瀉法五臟藏氣下降之法肝木之氣欲降而不下當折其所勝刺手太陰肺之井穴少商手陽明大腸之合穴曲池心火之氣降而不下當折其所勝刺足少陰之井穴湧泉足太陽膀胱之合穴委中脾土之氣降而不下當折其所勝刺足厥陰肝之井穴大敦足少陽贍之合穴陽陵泉肺金之氣降而不下當折其所勝刺心包絡之井穴中衝手少陽三焦之合穴天井腎水之氣降而不下當折其土刺足太陰脾之井穴隱白足陽明胃之合穴下陵三里以上所言下降取穴勿須待時之正例欲氣下行用右手大指甲下括針柄使氣下行純用瀉法如病在六腑邪實過勝者當取手少陽合穴者用足太陽絡委陽穴代之當取手陽明合穴者用足陽明巨虛上廉代之當取手太陽合穴者用足陽明巨虛下廉代之此依據靈樞經本輸篇大腸合於巨虛上廉小腸合於巨虛下廉三焦下俞出於膕中外廉名曰委陽陰有陽疾實則瀉之之正例臥針迎隨手法難經云經言能知迎隨之氣可令調之調氣之方必在陰陽何謂也然所謂迎隨者知營衛之流行經脈之往來隨其逆順而取之故曰迎隨調氣之方必在陰陽者知其內外表里隨其陰陽而調之故曰調氣之方必在陰陽張世賢注云手足三陽手走頭而頭走足手足三陰足走胸而胸走手此乃經脈往來定規凡欲瀉者用針芒向其經脈所來之處迎其氣之方來未盛乃逆針以奪其氣是謂之迎凡欲補者用針芒向其經脈所去之路隨其氣之方去未虛乃順針以濟其氣是謂之隨迎隨之施將以調氣調氣之術必在知其病之在陰在陽隨其陰陽虛實而施迎隨補瀉以調其氣焉內里為陰外表為陽內有表裡外亦有表裡也古人有曰表之表里之裡正此意也陽虛陰實則瀉陰而補其陽陽實陰虛則瀉陽而補其陰隨其陰陽而調之也按男子午前女子午後照補瀉正法用之如女子午前男子午後則當反其例而用之蓋男子應日女子應月陰陽升降不同用針者不可不辨例如男子午前針左手陽經針芒從外往上為隨針芒從內往下為迎針左足陽經針芒從內往下為隨針芒從外往上為迎針左足陰經針芒從外往上為隨針芒從內往下為迎針左手陰經針芒從內往下為隨針芒從外往上為迎李南豐注云手上陽進陰退足上陽退陰進一合六經起止故也凡針起穴針芒向上氣順行之道凡針止穴針芒向下氣所止之處左外右內令氣上行右外左內令氣下行或問午前補瀉與午後相反男子補瀉與女子相反二蓋男子之氣早在上而晚在下女子之氣早在下而晚在上故男子陽經午前呼為補吸為瀉女子陽經午前以吸為補呼為瀉午後亦反之或者又曰補瀉必資呼吸假令屍厥中風不能使之呼吸者奈何曰候其自然之呼吸而轉針若當吸不轉令人以手掩其口鼻鼓動其氣可也噫補瀉提插分男女早晚其理深微原為奇經不拘十二經常度故參互錯綜如是若流注穴但分左右陰陽可也嘗愛雪心歌云如何補瀉有兩般蓋是經從兩邊發古人補瀉左右分今人乃為男女別男女經脈一般生晝夜循環無暫歇此訣出自梓桑君我今授汝心已雪此子午兼八法而後全也進針手法內經云知為針者信其左不知為針者信其右蓋取穴的時先以沸水洗淨穴位醫者亦必用沸水溫針洗手消毒再以左手大指甲切按其穴成十字形然後令病人咳嗽一聲醫者左手持穴右手以大指中指持針食指壓針頂無名指輔針隨咳刺入再令病人用口吸氣醫者徐徐左右旋轉進針大約吸氣三口針透天部吸氣至六口針至人部吸氣九口針到地部如肌肉輕鬆進針容易吸氣未至九口而針已到地部者少吸數口氣亦可如肌肉緊密吸氣九口而針未到地部者再多吸氣數口總以針至地部為止再如針至肉膜膜厚針受阻則令病人口呼氣將針輕提再令病人吸氣將針重下透肉膜後進針至易針到地部時令病人呼氣一口微提針如小豆許即停針候氣停針時用大指甲括針柄向上括之之正例如病在下而針穴在上者則下括針柄如病在陽經背部而所針開穴為手陰經者右手括針時以左手指隨其經脈之道按引氣而導至肩髎令病者用鼻大呼氣一口乘呼氣時將針外轉一次用大指甲將針柄下括數次乃停針候氣此即靈樞經第一篇右主推之左持而御之一之義如病在陰經腹部而所取開穴在手陽經者用右手大指甲將針柄上括左手指隨其經脈之道按引氣而導至肘上轉折入臑腋令病人用口大吸氣一口針向內轉一次再用大指將針柄下括二三下乃停針候氣催氣手法停針十分鐘內如針下有脹痛一之感覺見針四圍有紅暈即知邪氣已至針下立用正手法瀉之如停針十分鐘以上而針不脹不痛見針四圍亦無紅暈即知邪氣未至針下當用催氣法催之催氣法陽日用偶陰日用奇數內轉令病人吸氣外轉令病人呼氣陽日用至六數時即令病人顛倒呼吸呼氣時針內轉吸氣時針外轉顛倒重用六數乃停針候氣如邪氣不至如法再催或三催頃刻針下脹痛即知邪氣已至勿須再催即用補瀉正法調和營衛手法補瀉寒熱升降正手法用畢時針下輕鬆病人痛苦輕減將出針時先用調和營衛手法先和營一氣後再調衛一氣和營氣針在地部不分陰日陽日和營皆用六數調衛皆用九數和營用口呼吸調衛用鼻呼吸先吸後呼吸氣針內轉呼氣針外轉和營六數時針在地部不必輕提和營六數用畢頃刻即令病人用鼻呼吸仍先吸氣後呼氣吸氣針內轉呼氣針外轉外轉時注意將針徐徐提至天部調衛九數用畢再停針頃刻即出針出針時再令病人用口輕輕吸氣數口不拘奇偶將針左右輕輕旋轉出針出針後如血分有瘀滯針下微見黑血令病者勿疑說明病理以手按擠左右令黑血盡出見紅血即自止出針時邪氣有餘針之周圍紅暈不盡皮膚微覺高起微覺脹痛則將針搖大其孔出針後不必用閉門法出針時如邪氣已盡正氣不足病人頭部覺昏暈針周圍皮膚色白針下輕鬆者右手出針速用左手大指按其孔穴揉和之使正氣不致消耗靈樞經云瀉曰必持內之放而出之排陽得針邪氣得泄補曰如留而還去如弦絕令左屬右其氣故止外門已閉中氣乃實必勿留血即取誅之此出針當按不當按之理用針脈法靈樞經云凡將用針必先診脈脈法繁多用針者以六字概括曰緩急大小滑澀一急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱澀者多血而少氣微有寒六脈主五臟諸病詳見經文不繁贅惟小脈不可針諸小者陰陽形氣俱不足勿取以針而調以甘藥也蓋陰陽虛實互有盛衰者則補之瀉之人迎主三陽寸口主三陰人迎大寸口一倍二倍三倍則三陽氣盛當瀉三陽而補三陰寸口大人迎一倍二倍三倍則三陰氣盛當瀉三陰而補三陽盛則瀉之虛則補之熱則疾之寒則留之此補瀉寒熱之正法也不盛不虛以經取之此調和營衛之常法也如久病陰陽血氣皆不足人迎寸口脈皆小只可用甘淡之藥以調之則慎用針再者藏氣有絕於內外之分絕於外者則脈去而不來金匱云不來或曲如蛇行者死或來而無去尺中無脈此藏氣將絕之脈形如不診其脈而妄針之下針即死其死者有躁靜之分躁者五臟之氣已先絕於外其脈去而不來醫者以手按尺脈則寸關之脈全無手足厥逆四末本輸諸井已無所出而十二原接受三百六十五節氣味轉註之道已絕藏真之氣不得天氣穀氣入而合之則藏之氣暴露於外以致其脈去而不來不用針亦將死之候針之即死其死也躁動不安蓋因藏真之氣盡量泄於外也是謂逆厥靜者五臟之氣已先絕於內其脈來而不去醫者以手按寸則尺關之脈全無張口短氣吸而難入蓋藏真之氣將絕雖有天氣穀氣欲補充之亦無能為力不用針亦將死之候針之即死蓋藏真之氣先竭而妄針之重竭其外來之氣其死也靜是謂重竭取五脈者死其義有二一五里脈尺動脈在五里為五腧之禁蓋五臟之真氣嘗賴六腑水穀之氣以養之五里乃手陽明之要穴如藏氣已損而妄針之則六腑水穀之氣補充五臟之要道隔絕得谷者昌絕谷者亡即此義也二五臟之氣絕而各有脈形春弦夏鉤秋毛冬石四季脈代二但弦無胃曰死如按琴瑟但鉤無胃曰死前曲後居如操帶鉤但毛無胃曰死按之蕭索如風吹毛但石無胃曰死來如解索去如彈石但代無胃曰死動而中止不能自還以上五脈不可用針仲景云脈結代心動悸炙甘草湯主之本調以甘藥之正義然次條釋脈末語云名曰代陰也得此脈者必難治脈經定為死脈賢如仲師對此脈之斷語難治之上加一必字與不可治之死證相去幾希惡可用針乎針效用針大要診脈後先辨其表裡虛實寒熱久病暴病陽盛陰虛陰盛陽虛或病六腑或病五臟五臟有疾當取大淵大陵太衝太白太谿諸原穴本名俞穴針以出病藉用穀氣托邪外出故靈樞法天篇稱九針十二原也五臟痼疾有外來者有內生者有相傳者有阻礙部分者用針手法各有不同經云五臟之有疾也譬猶刺也猶汙也猶結也猶閇也刺雖久猶可拔邪自外來者瀉之而已汙雖久猶可雪邪自內生縱橫傳播或補母或瀉子或取其勝者而瀉之之謂結雖久猶可解閇雖久猶可決此即刺法論中上升下降升之者均須待時解結之謂降之者折其所勝勿須待時決閇之謂詳見升降手法篇不再贅六腑有疾六腑為陽五臟為陰背為陽腹為陰陰有陽疾者取之下陵三里蓋腹為陰部有陽明胃腸之病者正往勿殆氣下乃止不下復始蓋陽明多氣多血大瀉之盡除其邪日二刺之亦無損於正也六淫之邪病在三陰三陽人迎脈大於寸口寸口脈大於人迎此即陽盛陰虛陰盛陽虛之鑑別再有一盛二盛三盛之分詳前用針脈法久病暴病如中風歷節之痼疾須用子午搗臼一最繁難之手法急痧卒然倒僕當刺指井見血急則急之緩則緩之此迥然有別也新病在表者當淺刺之陽經取陷針陷脈二則外邪立除針中脈二則濁氣除針太深則邪氣反沉氣之在脈邪氣在上濁氣二在中清氣二在下清者為營濁者為衛淺病近於衛用針不必損其營不可不辨如病入里則當深針之停針候氣辨其寒熱虛實詳補瀉寒熱各篇排邪得宜病可立愈經云刺之要氣至而有效效之信若風之吹雲明乎若見蒼天刺之道畢矣針害凡將用針必先診脈辨其虛實五臟之氣已絕內外者針之即死邪正俱虛其脈小不可用針而應調以甘藥均詳於上其有邪正俱實當用純瀉法如邪實正虛當先瀉而後補之補瀉反則病益篤男內女外男外女內亦詳於前其補瀉有太過不及者亦能為害例如邪氣實而正氣虛邪氣至針下緊而急穀氣至針下徐而和如醫者針下不善分析穀氣已至而仍用瀉針則耗損精專之營一營者水穀之精氣此所謂刺之害中而不去則精泄精泄則病益甚而恇也反言之邪正俱實邪氣未盡穀氣未至而針下緊急當續用瀉法盡除其邪氣如指下針下不明驟然出針則餘邪蘊於中或生癰瘍此所謂害中而去則致氣致氣則生癰瘍用針者不可不慎也此針害之概要針灸禁忌靈樞經法時篇云補瀉反則病益篤難經七十八難曰男外女內不得氣是謂十死不一治十二禁針一男外一失氣二女內一失氣三新內勿刺已刺勿內四已醉勿刺已刺勿醉五新怒勿刺已刺勿怒六新勞勿刺已剌勿勞七已飽勿刺已刺勿飽八已飢勿刺已刺勿飢九已渴勿刺已刺勿渴十大驚大恐必定其氣乃刺之十一乘車來者臥而休之如食頃乃刺之十二出行來者坐而休之如行十里頃乃刺之忌灸者八穴二少商魚際經渠勞宮陽池少海委中陰陵泉歌曰環周八穴灸無功足下陰陵泉委中魚際經渠少商穴陽池少海與勞宮妊婦忌針者二穴三合谷崑崙歌曰環周二穴慎施針合谷崑崙可墜妊妙手安胎亦有術先從足下補三陰經正六合人身經脈十二迴環之道有升有降陰陽不同言脈度者左右男女不同此人道也本輸皆出於四末一陽受氣於四末積陽為天天之在我者德也陽為之主陰為之輔名為經正手足三陽為主手足三陰輔之三陰合三陽名為六合皆至外而內不同於經脈脈度之常道故篇名經別蓋五臟六腑之經脈離合出入合於天之道也故本輸各臟腑之穴為合蓋指井本乎天氣入肘膝四關一乃合於人身臟腑之氣自內而外偏重五臟真機自外而內稟受六元正紀此人之合於天道也手三陰合手三陽足三陰合足三陽十二正凡六合詳見經別篇附本輸穴即景詩十二首漁翁詠手太陰肺五腧穴少商湖海一漁翁魚際大淵任轉篷漫道經渠不可測還教尺澤起蛟龍夜色詠手陽明大腸六腧穴商陽茆屋二三間合谷陽谿第幾彎九曲池邊雲影淡滿天星斗浴波瀾秋風詠足陽明胃六腧穴秋風厲兌內庭西陷谷衝陽過解谿三里未知何日到幾番翹首欲思齊野寺詠足太陰脾五腧穴隱白雲中一老僧大都離俗少人憎幾回太白商丘過汲飲陰陵泉幾升班師詠手少陰心五腧穴少衝少府把師班兵馬神門得勝還靈道戰書前日發而今少海已歸山觀漲詠手太陽小腸六腧穴浮萍少澤任東西前谷淵源繞後谿腕骨又通陽谷澗交流小海欲傾隄茅亭詠足太陽膀胱六腧穴茅亭結起至陰邊通谷浮雲四望煙束骨近同京骨峙崑崙遙與委中連遠眺詠足少陰腎五腧穴秋高間眺湧泉邊然谷太谿豁眼簾復溜一帆陰谷去江山覽勝碧連天秋雁詠手厥陰心包絡五腧穴中衝孤雁徹雲霄幾度勞宮破寂寥轉過大陵來間使深淵曲澤莫招搖詠蝶詠手少陽三焦六腧穴關衝桃李液門裁中渚陽池次第開花落支溝香滿澗一天井字蝶飛來別恨詠足少陽膽六腧穴竅陰別後恨相牽幾俠谿臨泣杜鵑懷抱丘墟情未畢煩君陽輔寄陵泉春遊詠足厥陰肝五腧穴雲霞煙鎖大敦峰忘卻行間轉太衝坐望中封無路入曲泉流水聽淙淙按此明萬厲梁大川題李南豐醫學入門之作仙與任君應秋討論之潤色之附之篇末以博當代儒而醫者一粲
