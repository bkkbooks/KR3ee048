body:
  text: 上卷本輸穴說難手太陰肺經五腧穴一少商井穴部位在手大指端內側去爪甲角如韭葉證治煩心善噦心下滿汗出而寒咳逆痎瘧振寒腹滿唾沫唇乾引飲不下膨膨手攣指痛寒慄鼓頷喉中鳴針灸三稜針刺之微出血泄諸臟熱氣不宜灸按少商乃陰井木穴之始西方白色入通於肺其音商商而曰少者五臟為陰陰常不足也二魚際滎穴部位在大指本節後散脈中證治灑淅惡風寒虛熱舌上黃身熱頭痛咳嗽汗不出痹走胸背痛不得息目眩煩心少氣腹痛不下食肘攣支滿喉中乾燥寒慄鼓頷咳引尻痛溺出嘔血心痹悲恐針灸針入二分留三呼按魚際乃陰滎火穴在手大指後魚腹中手大指接近次指時則魚腹豐滿離開次指時則本節後內側微陷下有如魚腹正中交際之形故名魚際魚際為火穴肺為金藏火能剋金故此穴言針不言灸三大淵俞穴部位在手掌後陷中證治胸痹逆氣寒厥善噦嘔飲水咳嗽煩惋不得臥肺脹滿膨膨臂內廉痛目生白翳眼眥赤筋缺盆中引痛掌中熱數欠喘不得息噫氣上逆心痛唾血振寒咽乾狂言口僻針灸針入二分可灸三壯按大淵乃脈之所會本輸篇云魚後一寸陷者中也為俞蓋其穴在手大指如魚形之後再下一寸即寸口脈之起點此五臟之腧穴亦稱原穴蓋六腑水穀精華注入五臟經腧之起原處故稱淵四經渠經穴部位在寸口陷中證治瘧寒熱胸背拘急胸滿膨膨喉痹掌中熱咳嗽上氣數欠熱病汗不出暴痹喘足心痛嘔吐針灸針入二分留三呼禁不可灸灸即傷人神按經渠寸口中也動而不居即關上部位寸至關長一寸九分以下即為尺中言經渠者乃經過之沖渠要道大淵在寸口之始經渠居寸口之中並未入於尺中也五尺澤合穴部位在肘中約紋上動脈中證治風痹肘攣手臂不得舉喉痹上氣舌乾咳嗽唾濁四肢暴腫臂寒短氣針灸針入三分可灸五壯其尺澤乃肺之合穴可針可灸蓋陰合為水肺為金藏水乃金之所生邪之實者針之瀉某子故也肺乃臟氣之藏山澤通氣此穴恰在太陰尺中脈之結點故名尺澤義至深也手陽明大腸經六腧穴一商陽井穴部位在手大指次指內側去爪甲角如韭葉證治胸中氣滿喘咳支腫熱病汗不出耳鳴耳聾寒熱痎瘧口乾頤頷腫齒痛惡寒肩背急相引缺盆痛目青盲針灸針入一分留一呼右取左左取右如食頃立已可灸三壯按商陽乃陽井金穴之始木上有水曰井水乃金之所生陽常有餘商乃肺音大腸合之故曰商陽大腸之脈上頸貫頰交人中左之右右之左上夾鼻孔故治齒病目病當左取右而右取左也二二間滎穴部位在手大指次指本節前內側陷中證治喉痹頷腫肩背痛振寒鼻鼽衄血多驚口喎針灸針入三分可灸三壯按二間乃陽滎水穴金水相生可針可灸手次指亦名食指共三節此穴在二節與三節之中間故曰二間三三間俞穴部位在手大指次指本節之後內側陷中證治喉痹咽中如鯁齒齲痛嗜臥胸滿腸鳴洞泄寒瘧唇焦口乾氣喘目眥急痛針灸針入三分留三呼可灸三壯按三間乃陽俞木穴手陽明脈之所注在食指本節第三骨之後大次指歧骨之前穴居其中故名三間四合谷原穴部位在手大指次指歧骨間陷中證治療寒熱瘧鼻鼽衄熱病汗不出目視不明頭痛齒齲喉痹痿臂面腫唇吻不收喑不能言口噤不開針灸針入三分留六呼可灸三壯若婦人妊娠不可剌刺之損胎氣按合谷乃大腸手陽明之原穴居大指次指歧骨間稍偏次指微前缺陷中直下可達勞宮與後谿成一直線大指次指相合處類似深谷故稱合谷病重者可深刺八分或一寸五陽谿經穴部位在腕中上側大指與次指兩筋間陷中證治狂言喜笑見鬼熱病煩心目風赤爛有翳厥逆頭痛胸滿不得息寒熱瘧疾喉痹耳鳴齒痛驚掣肘臂不舉痂疥針灸針入三分留七呼可灸三壯慎如合谷法按陽谿乃手陽明所行之經穴手太陰肺別絡列缺交會之處肺位最高大腸居下手指掌後仰則大指與次指兩筋高起太陰交陽明之處有類山溪故名陽谿六曲池合穴部位在肘外輔骨屈肘曲骨之中以手拱胸取之證治肘中痛偏風半身不隨刺風癮疹喉痹不能言胸中煩滿筋緩捉物不得挽弓不開屈伸難風臂肘細而無力傷寒餘熱不盡皮膚乾燥針灸針入七分得氣先瀉後補之可灸三壯按曲池乃大腸手陽明之合穴陽合為土陽明多氣多血有餘者瀉之然大腸為庚金土穴乃金之母故瀉後當補之邪氣之來也緊而急穀氣之來也徐而和先瀉後補指下針下猶有所別穴在肘外輔骨稍前陷中屈曲其臂乃得之故稱曲池足陽明胃經六腧穴一厲兌井穴部位在足大指次指之端去爪甲角如韭葉證治屍厥口噤氣絕狀如中惡腹脹滿汗不出寒瘧不嗜食麵腫足胻寒喉痹齒齲惡風鼻不利多驚好臥針灸針入一分可灸一壯按厲兌乃足陽明所出之井金穴屍厥或胃家實皆可用鋒針淺刺之厲不美也兌通也足次指受大指之排擠其形惡厲其經脈斜通於次指外間故名厲兌二內庭滎穴部位在足大指次指外間陷中證治四肢厥逆腹脹滿數欠惡聞人聲振寒咽中引痛口喎齒齲痛瘧不嗜食針灸針入三分可灸三壯按內庭乃陽滎水穴在足次指外間中指內間跗上半寸兩指之正中如一庭豎於內故名內庭三陷谷俞穴部位在足中指內間本節後陷中去內庭二寸證治面目浮腫及水病善噫腸鳴腹痛熱病汗不出振寒瘧疾針灸針入三分留七呼可灸三壯按陷谷乃陽俞木穴病重者可針五分穴位下陷如深谷故名陷谷四衝陽原穴部位在足跗上五寸去陷谷二寸半證治偏風口眼喎斜跗腫齒齲痛發寒熱腹堅大不嗜食傷寒病振寒而欠久狂登高而歌棄衣而走足緩履不收身前痛針灸針入五分可灸三壯按衝陽在足背高起處有動脈應手名趺陽脈久病欲知府氣之強弱者必診此脈其穴類似中封使逆則宛和則通搖足而得之水穀精華大會於此陽明多氣多血有此一沖衢故名衝陽五解谿經穴部位在衝陽後一寸五分腕上陷中證治治風面浮腫顏黑厥氣上衝腹脹大便下重瘈驚膝股胻腫轉筋目眩頭痛癲疾煩心悲泣霍亂頭風面目赤眉攢疼針灸針入五分可灸三壯按解谿乃陽經火穴上為胻骨下為跗屬分解於此穴陷中故名解谿俗稱鞋帶穴以束縛鞋帶正在此穴間也六足三里合穴部位在膝下三寸胻骨外廉大筋內宛宛中兩筋肉分間當低跗取之證治胃中寒心腹脹滿胃氣不足聞食殠腸鳴腹痛食不化秦丕祖云諸病皆治食氣水氣蠱毒痃癖四肢腫滿膝胻痠痛目不明華佗云療五勞羸瘦七傷虛乏胸中瘀血乳癰人年三十以上若不灸三里令氣上衝目針灸針入五分可灸三壯按三里穴名手足陽明皆有名同穴異繼起針灸家增一足字以別之蓋陽明行氣於三陽里者寬廣之義古井田制九百畝為方里蓋胃為水穀之海大腸小腸三焦無處不到也六腑皆出足之三陽上合於手故本輸篇稱之曰下陵三里為高必因丘陵大阜曰陵高於丘也陵冠一下字蓋足三里穴不如手陽明三里之高上手三里又不如足三里之敦阜且也足太陰脾合於膝內陰之陵泉足少陽膽合於膝外陽之陵泉皆高於足陽明胻骨外之三里故正其名曰下陵三里其穴可針一寸肥人可針一寸二分如足下病風毒可儘量多灸足太陰脾經五腧穴一隱白井穴部位在足大指端內側白肉際側當作折傳寫之訛已久證治腹脹喘滿不得安臥嘔吐食不下暴泄衄血卒屍厥不識人足寒不能溫針灸針入三分灸三壯若婦人月事過時不止刺之立愈按先師許公直礽傳授有云足大指端內側乃大敦穴非隱白穴隱白在足大指下折紋中其穴常隱而肉色白故名隱白二大都滎穴部位在足大指本節之後內側陷中骨罅中赤白肉際證治熱病汗不出傷寒手足逆冷腹滿善嘔煩熱悶亂吐逆目眩針灸針入三分可灸三壯按大都乃脾所溜之滎穴古者邑有先廟曰都周禮地官四縣曰都脾為土藏乃四象之母滎為火穴又土之母合乎先廟之義經脈十二之次序脾居四位又合乎四縣曰都之義其穴在足大指本節高起之後赤白肉皆豐滿故名大都三太白俞穴部位在足內側核骨下陷中證治身熱煩滿腹脹食不化嘔吐膿血腰痛大便難氣逆霍亂腹中切痛針灸針入三分可灸三壯按太白乃陰俞土穴土能生金西方金其色白足內側肉色較足跗足底特白望其色而名之故稱太白穴在足內側核骨下核骨一作覈骨一名腕骨本輸篇云太白腕骨之下也俗名孤拐骨四商丘經穴部位在足內踝下微前陷中證治腹脹腸鳴不便脾虛人不樂身寒太息心悲氣逆痔疾骨疽蝕婦人絕子小兒慢風針灸針入三分可灸三壯按商丘乃陰經金穴四方高中央下曰丘登高初步之小阜也商乃西金之高音脾井滎俞經四穴皆居卑位由此穴而上內踝乃與三陰交會而入合於陰之陵泉登高必自卑故名商丘五陰陵泉合穴部位在膝下內側輔骨下陷中伸足取之與陽陵泉斜對稍高一寸證治腹中寒不嗜食膈下滿水脹腹堅喘逆不得臥腰痛不得俯仰霍亂疝瘕小便不利氣淋寒熱不節針灸針入五分不言灸按陰陵泉乃脾合水穴脾為陰中之至陰陵高於丘也泉高處之水源也故靈樞經曰疾高而內者取之陰之陵泉蓋五俞合穴下達於上內通於外之要點治病當求其源也其穴不言灸者以脾為土臟土中含濕則萬物育焉如灸之灼其泉源則土燥而不能育物也手少陰心經五腧穴一少衝井穴部位在手小指內廉之端去爪甲角如韭葉證治熱病煩滿上氣心痛痰冷少氣悲恐善驚掌中熱胸中痛口中熱咽中酸乍寒乍熱手攣不伸引肘腋痛針灸針入一分可灸三壯二少府滎穴部位在小指本節後陷中平直勞宮證治煩滿少氣悲恐畏人掌中熱臂酸肘腋攣急胸中痛手卷不伸針灸針入二分可灸七壯三神門俞穴部位在掌後兌骨之端陷中證治瘧心煩甚欲得飲冷惡寒則欲處溫中咽乾不嗜食心痛數噫恐悸少氣不足手臂寒喘逆身熱狂悲狂笑嘔血上氣遺溺大小人五癇針灸針入三分留七呼可灸七壯炷如小麥大四靈道經穴部位在臂內下廉去掌後橫紋後一寸五分證治心痛悲恐相引瘛瘲肘攣暴喑不能言針灸針入三分可灸三壯五少海合穴部位在肘內廉橫紋頭盡處陷中曲手向頭取之證治寒熱齒齲痛目眩發狂嘔吐涎沫項不得回顧肘攣腋脅下痛四肢不得舉針灸針入五分不宜灸按以上少衝少府神門靈道少海為心本藏之井木滎火俞土經金合水五穴乃扁鵲所增本輸篇並未記載然神門一穴照子午流注甲己日卯時針之治大小人癇證有特效仙用針數十年心本藏九穴僅取神門一穴餘八穴未曾一次取用蓋尊經旨外經病而內不病獨取其經於掌後兌骨之端之正義兌骨即掌外側腕後高起之踝骨手踝骨向內轉踝內側骨有空即神門穴踝骨上另有一空即養老穴經稱此骨名兌骨兌有內通之義向內一轉則神門養老兩孔穴皆開與足內外踝之頑梗不開無穴可取者迥然不同故別其名曰兌骨繼起針灸家多書作銳骨義未妥手太陽小腸經六腧穴一少澤井穴部位在小指之端去爪甲下一分陷中證治瘧寒熱汗不出喉痹舌強口乾心煩臂痛瘛瘲咳嗽頸項急不可顧目生膚翳覆瞳子針灸針入一分可灸一壯按少澤井金乃手少陰交手太陽之起穴心乃五臟六腑之主合於小腸山澤通氣一手小指而兩井穴出其內外心井曰少衝小腸井曰少澤二前谷滎穴部位在小指外側本節之前陷中證治熱病汗不出痎瘧癲疾耳鳴頷腫喉痹咳嗽衄血頸項痛鼻塞不利目中白翳臂不得舉針灸針入一分可灸一壯按前谷滎水穴乃手太陽脈之所溜在小指本節前故稱前谷三後谿俞穴部位在小指外側本節後陷中握掌取之證治瘧寒熱目赤生翳鼻衄耳聾胸滿頭項強不得回顧癲疾臂肘攣急針灸針入一分可灸一壯按後谿俞木穴乃手太陽脈之所注在手小指本節之後掘掌視之較前谷高起故稱後谿穴內通督脈乃靈龜八穴之一照開時針之可針六分或八分四腕骨原穴部位在手外側腕前起骨下陷中證治熱病汗不出脅下痛不得息頸頷腫寒熱耳鳴目冷淚生翳狂惕偏枯臂肘不得屈伸痎瘧頭痛煩悶驚風瘛瘲五指掣針灸針入二分留三呼可灸三壯按腕骨乃手太陽脈所過之原穴手外側腕前一小骨手常屈伸轉側則此骨宛轉穴在骨稍前故名腕骨穴繼起針灸家更名起骨以免與穴名混同亦可五陽谷經穴部位在手外側腕中兌骨之下陷中證治癲疾狂走熱病汗不出脅痛頸頷腫寒熱耳聾耳鳴齒齲痛臂腕外側痛不舉妄言左右顧瘛瘲目眩針灸針入二分留二呼可灸三壯按陽谷經穴乃太陽脈之所行在手外側腕中斜上兌骨則為養老與腕上手少陽陽池及大次指兩筋間之陽谿穴成一橫線然此穴不如陽谿陽池之寬深故名陽谷六小海合穴部位在肘內大骨之外去端半寸陷中伸臂而得之證治肩臑肘臂外後廉痛寒熱齒齦腫風眩頸項痛瘍腫振寒肘腋痛腫小腹痛四肢不舉針灸針入二分可灸三壯按小海合穴乃手太陽小腸脈之所入合治內府其脈入缺盆者絡心循咽下膈抵胃屬小腸胃為水穀之海小腸與胃相連綴故肘內合穴名小海且手三陽脈皆起於足小腸合於巨虛下廉大腸反合巨虛上廉蓋大腸展轉反側為傳導之官小腸乃受盛之官直趨於下化物出焉故合穴反居大腸合穴之下也足太陽膀胱經六腧穴一至陰井穴部位在足指外側去爪甲如韭葉證治目生翳鼻塞頭重風寒從足小指起脈痹上下帶胸脅痛無常處轉筋寒瘧汗不出煩心足下熱小便不利針灸針入二分可灸三壯按至陰乃足太陽膀胱所出之井金穴考經脈十二回環之次序足太陽終於此穴交足少陰腎之經蓋太陽經穴至此已交於陰經故曰至陰二通谷滎穴部位在足小指外側本節前陷中證治頭重目眩善驚引鼽衄頸項痛目䀮䀮針灸針入二分留三呼可灸三壯按通谷乃足太陽所溜之滎穴滎小水也谷能通行小水故名通谷三束骨俞穴部位在足小指外側本節之後赤白肉際陷中證治腰脊如折髀不可曲膕如結腨如裂耳聾惡風寒目眩項強不可回顧目內眥赤爛針灸針入三分可灸三壯按束骨穴乃足太陽所注之俞穴前有足小指本節骨後有京骨穴上之大骨此穴居外側赤白肉際陷者中前本節骨後大骨如受約束之形故名束骨四京骨原穴部位在足外側大骨之下赤白肉際陷中證治膝痛不得屈伸目內眥赤爛瘧寒熱善驚不欲食筋攣足胻酸髀樞痛頸項強腰背不可俯仰衄血不止目眩針灸針入三分可灸七壯按京骨穴乃足太陽所過之原穴京大也其穴在足外側大骨之下此大骨本名京骨因與穴同名別其名曰大骨與手腕骨別稱起骨同一義也五崑崙經穴部位在足外踝後跟骨之上陷中證治腰尻痛足踹腫不得履地鼽衄膕如結踝如裂頭痛肩背拘急咳喘暴滿陰腫痛小兒發癇瘛瘲針灸針入五分可灸三壯炷如小麥大妊婦刺之墮胎按崑崙乃足太陽所行之經穴膀胱為水府此穴居踝後較井滎俞原各穴皆高崑崙乃水之高源故以此名其穴六委中合穴部位在膕中央約紋動脈陷中令人面挺伏地臥取之證治膝痛腰挾脊沉沉然遺溺腰重不能舉體風痹髀樞痛可出血痼疹皆愈凡傷寒熱汗不出取其經血立愈委中者血郄也大風發眉墮落可刺之出血針灸針入八分留三呼瀉七吸禁灸按委中乃足太陽膀胱經所入之合穴穴在膕中央委而取之故名委中凡太陽經脈所過腰髀膝關重痛大風眉落風邪深入於陽蹺奇經乃足太陽之別脈均可刺委中出血以上所言皆邪實宜瀉之之證正虛者則不可妄刺素問云刺委中大脈令人僕脫色不可不知也足少陰腎經五腧穴一湧泉井穴部位在足心陷中屈足卷指宛宛中白肉際跪取之證治腰疼痛大便難心中結熱風疹風癇心痛不嗜食婦人無子咳嗽身熱喉痹胸脅滿目眩男子如蠱女子如妊娠五指端盡痛足不得踐地針灸針入三分無令出血可灸三壯按湧泉乃腎所出之井穴藏真下於腎腎者主水故穴在足心名曰湧泉腎為生氣之藏立命之根故刺之不可見血如妄刺之而血出不止則死矣慎之慎之二然谷滎穴部位在足內踝腕骨前然骨之下陷中證治咽內腫心恐懼如人將捕之涎出喘呼少氣足跗腫不得履地寒疝少腹滿上搶胸脅咳唾血喉痹淋瀝女子不孕男子精溢胻酸不能久立足一寒一熱舌縱煩滿消渴初生小兒臍風口噤痿厥洞泄針灸針入三分不宜見血可灸三壯按然谷乃腎所溜之滎穴陰滎為火穴坎中有一陽無根之少火能生氣其穴亦名龍淵潛龍在淵之義也男女精溢不孕者皆取之此火能然於深谷之中不受水克故名然谷吾蜀有產鹽區名自流井火自地中出取之不盡用之不竭此亦然谷少火之明證也三太谿俞穴部位在內踝之後跟骨之上動脈陷中證治久瘧咳逆心痛如錐刺手足寒至節喘息者死嘔痰實口中如膠善噫寒疝熱病汗不出默默嗜臥溺黃消癉大便難嚥腫唾血若痃癖寒熱咳嗽不嗜食腹脅痛瘦瘠手足厥冷針灸針入三分可灸三壯按太谿穴腎脈所注為俞土乃九針十二原之要穴久病重病欲知臟氣之強弱者必診此脈金匱中脈法有寸口趺陽少陰之分趺陽即胃原衝陽少陰即太谿也仙曾於途中救治倒地昏迷之急痧證寸口無脈太谿有脈用開十宣法救之而痊如太谿脈已絕不可救也四復溜經穴部位在足內踝上二寸動而不休陷中證治腰脊內引痛不得俯仰起坐目䀮䀮善怒多言舌乾胃熱蟲動涎出足痿不收履胻寒不自溫腹中雷鳴腹脹如鼓四肢腫五種水病溺青赤黃白黑青取井赤取滎黃取俞白取經黑取合血痔泄後腫五淋小便如散火骨寒熱盜汗不止針灸針入三分留七呼可灸五壯按穴名復溜以足少陰別入跟中之脈下歧為二後繞大鐘交足太陽前下行水泉照海為陰蹺奇經之起點上達交信亦在內踝上二寸此別脈也其太谿正經直上之脈復從內踝稍後上二寸而溜於此與出湧泉溜然谷同義故名其穴曰復溜復溜在後交信在前中隔一小筋交信乃陰蹺郄再上腨分中曰築賓穴又陰維脈之起點故曰陰蹺陰維者足少陰之別也五陰谷合穴部位在膝內輔骨後大筋下小筋上按之應手屈膝乃得之證治膝痛不得屈伸舌縱涎下煩逆溺難少腹急引陰痛婦人漏下不止腹脹滿不得息小便黃男子如蠱女子如妊娠針灸針入四分留七呼可灸三壯按按陰谷乃足少陰腎所入為合之水穴穴在內輔骨後下大筋小筋間互相依倚取穴者必先令病者微屈其膝以指審其間應手之脈再撥開上下大小筋乃可進針此乃足陰經最高而深藏不露之穴故名陰谷手厥陰心包絡五腧穴一中衝井穴部位在手中指之端證治熱病煩悶汗不出掌中熱身如火心痛煩滿舌強針灸針入一分灸一壯按中衝乃心包絡所出之井穴膻中為臣使之官其脈出手三陰之正中手諸井穴皆在指側此穴獨居中指端之正中故名中衝二勞宮滎穴部位在掌中中指本節之內間證治中風善怒悲笑不休手痹熱病三日汗不出怵惕胸脅痛不可轉側大小便血衄血不止氣逆嘔噦煩渴食飲不下口腥殠胸脅支滿黃疸目黃針灸針入二分留六呼可灸三壯按勞宮乃心包絡之滎穴陰滎火穴勞勤也臣使之官代心主之官行政故曰勞宮三大陵俞穴部位在掌後兩骨之間方下兩筋間之始陷中證治熱病汗不出臂攣腋腫善笑不休心懸若飢喜悲泣驚恐目赤小便如血嘔逆狂言不樂喉痹口乾身熱頭痛短氣胸脅痛針灸針入五分可灸三壯按大陵乃心包絡所注之俞穴在掌後兩骨結點之下兩大筋間之始近大指前有大淵小指後有陰郄神門成一橫線穴位寬大故名大陵四間使經穴部位在掌後三寸兩筋間陷中證治心懸如飢卒狂胸中澹澹惡風寒嘔吐怵惕寒中少氣掌中熱腋腫肘攣卒心痛多驚喑不得語咽中如鯁針灸針入三分可灸五壯按間使二字皆作去聲讀在內關之後與外關別絡相通三焦孤府之營衛氣有餘而過於此則脈至無餘而不過於此則脈止臣使之官或至或止故曰間使五曲澤合穴部位在肘內廉下陷中屈肘取之證治心痛善驚身熱煩渴口乾逆氣嘔血風胗臂肘手腕善動搖針灸針入三分留七呼可灸三壯按曲澤乃心包絡所入之合穴在肘內廉大筋之下陷者之中微屈其肘乃得之其穴位深故曰曲澤手少陽三焦六腧穴一關衝井穴部位在無名指外側去爪甲角如韭葉證治口乾頭痛舌卷喉痹霍亂胸中氣噎不食肘臂痛不能舉目生翳膜視物不明針灸針入一分留三呼灸三壯按關衝乃三焦手少陽所出之井穴外關內關別絡橫通心包絡井穴曰中衝心本藏之井曰少衝此穴居少衝中衝之間故曰關衝二液門滎穴部位在小指次指之間合縫處陷中證治驚悸妄言寒厥臂痛不能自上下痎瘧寒熱頭痛目眩赤澀淚出耳暴聾咽外腫牙齦痛針灸針入二分灸三壯握拳取之按液門乃三焦之滎穴陽滎為水三焦者決瀆之官水道出焉水之精謂之液陽受氣於四末故名其水穴曰液門三中渚俞穴部位在無名指小指本節後間陷中液門後一寸證治熱病汗不出臂指痛不得屈伸頭痛目眩生翳目不明耳聾咽腫久瘧手臂紅腫針灸針入三分灸三壯握拳取之按中渚乃三焦所注之俞穴若江之有渚而居其中故曰中渚四陽池原穴部位在手腕上橫紋陷中證治消渴口乾煩悶寒熱瘧或因折傷手腕捉物不得臂不能舉針灸針入三分不宜灸按陽池乃手少陽三焦所過之原穴手表腕上陷中從無名指本節直摸至腕中心陷凹處如池狀故名陽池下針時不可搖手仰其指掌則穴位明顯五支溝經穴部位在腕後三寸骨間陷中證治熱病汗不出肩臂酸重脅腋痛四肢不舉霍亂嘔吐口噤暴喑產後血暈不省人事針灸針入三分灸七壯按支溝乃三焦所行之經穴穴前一寸有外關別絡入手厥陰經三焦水道流行至此別有一分支之溝渠也六天井合穴部位在肘外大骨之上陷中證治咳嗽上氣胸滿不得語唾膿不嗜食寒熱悽悽不得臥驚悸悲傷瘛瘲癲疾五癇風痹頭頸肩背痛耳聾目銳眥頰肘痛腫臂腕不得捉物及瀉一切瘰癧瘡腫疹針灸針入三分灸三壯按天井乃手少陽三焦經脈所入為合之土穴穴在肘外大骨後上一寸兩筋骨罅間陷中肘前五寸有穴曰四瀆溝瀆歸於下流而天井獨居其上蓋有用之水天一所生蓄之井裡以備生生化化之用故曰天井取穴時先曲其肘在大骨後一寸穴位取定令病人叉手按膝頭乃進針足少陽膽經六腧穴一竅陰井穴部位在第四指外側爪甲角證治脅痛咳逆不得息手足煩熱汗不出癰疽口乾口痛喉痹舌強耳聾轉筋肘不可舉針灸針入一分灸三壯按竅陰乃足少陽膽所出之井穴在足太陽之後為手少陽三焦下俞之起點少陽者一陽也陽根於陰故曰竅陰頭完骨上亦有竅陰穴乃手足少陽與足太陽之會故同名竅陰二俠谿滎穴部位在足小指次指歧骨間本節前陷中證治胸脅支滿傷寒熱病汗不出目赤頷腫胸痛耳聾針灸針入二分灸三壯按俠谿乃足少陽膽所溜之滎水穴三焦下俞在此與足太陽足少陽交會其穴位狹窄故名俠谿三臨泣俞穴部位在足小指次指本節後陷中去俠谿一寸五分證治胸滿氣喘目眩心痛缺盆中及腋下馬刀瘍瘻周痹痛無常處厥逆氣喘不能行痎瘧日西發者胻酸灑淅振寒婦人月經不調季脅支滿乳癰針灸針入二分灸三壯按臨泣乃足少陽所注之俞穴足少陽頭部有一臨泣穴在目上入髮際五分乃足少陽太陽陽維之會取之可治目眩淚生翳諸證居高臨下曰臨泣足下有此臨泣穴亦足太陽與足少陽交會處故同名臨泣此穴上通帶脈靈龜八穴中有此一開穴待時取之功用最大兩臨泣穴繼起針灸家在頭者曰目臨泣在足者曰足臨泣因足太陽少陽之起穴皆在目內外眥泣自目出故曰臨泣四丘墟原穴部位在外踝之前下陷中去俠谿五寸證治胸脅滿痛不得息寒熱目生翳膜頭腫久瘧振寒痿厥腰痠痛髀樞中痛轉筋足脛偏細小腹堅卒疝針灸針入五分灸三壯按丘墟乃足少陽膽經原穴丘之大者曰墟詩邶風升彼墟也讀上聲有升高之義膽六腧穴至此轉而高升故名丘墟五陽輔經穴部位在外踝上輔骨之前及絕骨之端即外踝上四寸光明懸鐘二穴之中證治腰溶溶如坐水中膝下膚腫筋攣百節痠疼痿痹馬刀頸項痛喉痹汗不出振寒痎瘧腰胻痠痛不能行立針灸針入五分灸三壯按陽輔乃足少陽所行之經穴陽經為火膽為陽木木能生火火曰炎上輔助其陽經之上升穴在外踝上輔骨前絕骨端故名陽輔六陽陵泉合穴部位在膝外陷中即膝下一寸外尖骨前之陷凹處蹲坐取之證治膝伸不得屈冷痹腳不仁偏風半身不遂腳冷無血色針灸針入六分灸七壯按陽陵泉乃足少陽膽經所入之合穴此穴在膝外突出陵高於丘此穴下有外丘有丘墟與膝內陰之陵泉斜對故名其穴曰陽陵泉凡疾高而外者皆可取此穴足厥陰肝經五腧穴一大敦井穴部位在足大指之端及三毛之中也證治卒心痛汗出腹脹腫滿中熱喜寐五淋七疝小便頻數不禁陰痛引小腹陰挺出血崩屍厥如死針灸針入一分灸三壯按先師許公直礽云大敦在足大指端內側其肉敦阜一般認大敦處為隱白誤矣凡傷寒病久熱入厥陰刺大敦見血立效考正穴法云大敦足大指端去爪甲如韭葉及三毛中蓋三脈動於足大指陽明在上厥陰在中太陰在下俗本太陰誤作少陰陽明多氣多血與肝脾同會於足大指故指上生叢毛名曰三毛三毛之間非大敦穴考足少陽脈交足厥陰別跗上入大指出其端還貫爪甲出三毛可證明經稱三毛中乃由足大指前之發端處達到三毛經過大指側肉起如敦狀處是穴穴在指端及三毛二者之中名曰大敦名實相副繼起用針者刺大敦多在足大指叢毛之間淺刺之誤矣二行間滎穴部位足大指次指間即合罅後五分動脈陷中證治嘔逆咳血心胸痛腹脅脹色蒼蒼如死狀中風口喎嗌乾煩渴瞑不欲視目中淚出太息癲疾短氣肝積肥氣痎瘧洞泄遺尿癃閉崩漏白濁寒疝少腹痛腰痛不可俯仰小兒驚風針灸針入三分灸三壯按行間乃足厥陰所溜之滎穴由大敦轉入足大指與足次指兩指縫間一彳一亍曰行兩足指相合故曰行間三太衝俞穴部位行間上二寸陷中證治虛勞嘔血恐懼氣不足嘔逆發寒肝瘧令人腰痛嗌乾胸脅支滿太息浮腫小腹滿腰引少腹痛足寒或大小便難陰痛遺溺溏泄小便淋癃小腹疝氣腋下馬刀瘍瘻胻酸踝痛女子月水不通漏血不止小兒卒疝針灸針入三分灸三壯按太衝乃足厥陰肝所注之俞穴肝臟血女子太衝脈盛則月事以時下太衝又為九針十二原之原穴五臟稟受六腑水穀氣味精華之沖衢故曰太衝四中封經穴部位在內踝之前一寸半陷者之中使逆則宛使和則通搖足而得之證治痎瘧色蒼蒼如死狀善太息振寒大便難小便腫痛五淋不嗜食身體不仁寒疝痿厥筋攣失精陰縮入腹相引痛或身微熱針灸針入四分灸三壯按中封乃足厥陰所行之經穴各針灸書中皆雲中封在足內踝前一寸靈樞本輸篇云在內踝之前一寸半蓋靈樞依據骨度凡言踝前後踝上下皆自踝骨中心起計算踝骨長一寸中心至四旁骨際長半寸繼起用針尺度除去踝中心至邊際半寸不算故云一寸所言不同其部位仍同穴在踝前陷中兩大筋所封閉故名中封取穴時仰其足則逆而宛伸其足則和而通搖其足則跗上兩大筋分開其穴乃見本輸六十餘穴詳言穴位字數最多者惟此一穴蓋取之不易也宛音郁義亦同五曲泉合穴部位在膝內輔骨之下大筋之上屈膝而得之證治㿉疝陰股痛小便難少氣泄利膿血腹脅支滿膝痛筋攣四肢不舉不可屈伸風勞失精身體極痛膝脛冷陰莖痛實則身熱目痛汗不出目䀮䀮發狂衄血喘呼痛引咽喉女子陰挺出少腹痛陰癢血瘕針灸針入六分灸三壯按曲泉乃足厥陰肝所入為合之水穴水之高而有來源者謂之泉穴在內輔骨之下大筋之上屈曲其膝乃能取得此穴故曰曲泉十二別絡一列缺部位去腕側上一寸半以手交叉食指末筋骨罅中手太陰絡別走陽明證治療偏風口喎手腕無力半身不遂咳嗽掌中熱口噤不開寒熱瘧嘔沫善笑縱唇口健忘針灸針入二分留三呼瀉五吸可灸七壯二偏歷部位在腕後三寸手陽明絡也別走太陰證治寒熱瘧風汗不出目視䀮䀮癲疾多言耳鳴口喎齒齲喉痹嗌乾鼻鼽衄血針灸針入三分留七呼可灸三壯按列缺偏歷乃手太陰手陽明陰交陽陽交陰橫斜而行之兩別絡穴列缺在兩手指交叉食指盡處以爪甲切之若呈列一缺點在此故名列缺特殊人有現反關脈者其脈不行寸口之中由尺中斜上列缺入陽谿穴而上食指大淵經渠正關脈之位不動而動列缺之上故名反關有一手反關有兩手反關數百人中有其一此得於有生之初非為受病而有此脈也列缺內通任脈為靈龜八穴之一待時而取之作用最大須用臥針斜向內久留其針補瀉寒熱升降各種手法皆可取用列缺上一寸半腕後上三寸即偏歷穴乃大腸手陽明經脈行至陽谿上偏向臂內別陽經脈而歷絡於手太陰之經故曰偏歷其十二經所行之次序肺寅大卯胃辰脾巳手陽明從手走頭交足陽明胃精專營氣一日一夜一周於身只走列缺不走偏歷只走豐隆不走公孫偏歷公孫等別絡乃二十八脈男女不同左升右降右升左降陰陽互相交錯脈度十六丈二尺乃行於偏歷公孫等交錯之別絡也三豐隆部位在外踝上八寸下廉胻外廉陷中別走太陰證治厥逆胸痛如刺腹中切痛大小便難澀厥頭痛面浮腫風逆四肢腫足青身寒濕喉痹不能言針灸針入三分可灸三壯四公孫部位在足大指本節後一寸足太陰絡別走陽明證治寒瘧不嗜食卒面腫煩心狂言腹虛脹如鼓針灸針入四分可灸三壯按豐隆與公孫兩別絡乃足陽明足太陰脈度往還之要道豐隆穴位在外踝中心直上八寸考骨度篇膝下至外踝長一尺六寸膝下三寸胻骨外為三里復下三里三寸為巨虛上廉復下上廉三寸為巨虛下廉此穴在下廉胻骨外以骨度推計之豐隆穴較高於下廉一寸然穴與上廉非直線別於陽明之正經之外其肉豐滿而隆起與巨虛上下廉迥然不同故名豐隆以骨度推之內絡太陰當在漏谷地機之間公孫別絡在足大指本節骨後一寸吾國古史以火德旺者曰炎帝以土德旺者曰黃帝黃帝姓公孫名軒轅公孫穴乃脾土別絡人體五臟脾居中央中央黃色入通於脾以土德旺此別絡穴別於太陰土位絡於陽明燥金之位土以生金亦猶以土德旺之後裔故名公孫由流溯原賜其姓也五通里部位去掌後橫紋後一寸陷中手少陰絡別走太陽證治熱病卒心中懊憹數欠頻伸悲恐目眩頭痛面赤而熱心悸肘臂臑痛實則支腫虛則不能言苦嘔喉痹少氣遺溺針灸針入三分可灸三壯六支正部位在腕後五寸小指動應手手太陽絡別走少陰證治寒熱頷腫肘攣頭痛目眩虛風驚恐狂惕生疣目針灸針入二分可灸三壯按通里支正乃手少陰手太陽從陰出陽從陽入陰之兩別絡穴名通里者以小腸為受盛之官化物出焉若井裡然心經穴靈道之前五分陰郄之後五分腕之後一寸即通里穴位一有云去腕一寸半者蓋通里在手外側腕上摺紋後手向外側屈而取腕間摺紋則為一寸如伸而取之則有一寸半也支正乃小腸別絡內注手少陰心心為五臟六腑之大主故曰正支者離也離小腸經脈而入絡於心之正主位故其別絡穴曰支正七飛揚部位在外踝上七寸足太陽絡別走少陰證治血痔歷節風足指不得屈伸頭目眩逆氣鼽衄癲疾寒瘧針灸針入三分可灸三壯八大鐘部位在足跟後踵中大骨兩筋間足少陰絡別走太陽證治實則小便淋閉洒洒腰脊強痛大便秘澀嗜臥口中熱虛則嘔逆多寒欲閉戶而處少氣不足胸張喘息舌乾咽中食噎不得下善驚恐不樂喉中鳴咳唾血針灸針入二分留七呼可灸三壯按飛揚大鐘乃足太陽足少陰經從陽入陰從陰出陽之兩別絡飛揚在外踝上七寸一名厥陽厥盡也陽至此而盡則絡於陰也飛揚跋扈有好高之義十二別絡如內關外關光明蠡溝在手足內外皆成平線而飛揚與足跟後踵中之大鐘穴較之上下懸殊矣大鐘之義有二一鍾者重也一鍾者飲器也腎為立命之根人之能立賴有此後踵大骨其責重大故曰大鐘腎者主水受五臟六腑之精而藏之水之精者曰津曰液膀胱為州渚之官津液藏焉腎之精津轉註膀胱之脈不有此一大鐘之飲器則津液無所藏之處故名其穴曰大鐘義至厚也九內關部位在掌後去腕二寸手心主之絡別走少陽證治目赤支滿中風肘攣實則心暴痛虛則心惕惕針灸針入五分可灸三壯十外關部位在陽池後二寸兩骨間與內關相對此手少陽絡別走心主厥陰脈證治耳聾渾渾無聞肘臂不得屈伸五指痛不能握針灸針入三分灸三壯按內關外關乃手厥陰心包絡與手少陽三焦經脈別陰出陽別陽入陰之絡穴掌內腕後二寸曰內關在兩筋間掌外腕後二寸曰外關在兩骨間握拳取之則兩筋明晰外關伏手取之則兩骨便於摩按此外關內關合於奇經陰維陽維乃靈龜八穴之二待時取之作用最大也十一光明部位外踝上五寸足少陽絡別走厥陰證治熱病汗不出卒狂嚼頰淫濼脛酸胻痛不能久立虛則痿痹偏細坐不能起實則足胻熱膝痛身體不仁針灸針入六分留七呼灸五壯十二蠡溝部位在內踝前上五寸足厥陰絡別走少陽證治疝痛小腹滿痛癃閉臍下積氣如杯數噫恐悸少氣足脛寒酸屈伸難腰背拘急不可俯仰月經不調帶下赤白針灸針入二分留三呼灸三壯按光明蠡溝乃足少陽膽足厥陰肝陽入陰陰出陽之兩別絡穴外踝上五寸曰光明內踝上五寸曰蠡溝蠡齧木之小蟲也肝為木臟膽為木府經脈十二始於肺而終於肝肝臟之血不能盡返於肺男子生髭鬚女子下月事肝者將軍之官謀慮出焉膽者中正之官決斷出焉思慮此迴環十二經己周之營血必有小數不潔者不特無益於肝之經脈而轉有損於肝之經脈如蠡溝之蝕木因置此一蠡溝穴與光明穴內外相應膽有決斷大放光明通於蠡溝是者存之轉於上腹屬肝絡膽非者去之有如日月光明則蠡溝之害木者自去也手三陽足下合穴一巨虛上廉手陽明下合穴部位在足三里下三寸外膝眼下六寸當舉足取之證治飧泄腹痛支滿狂走俠臍少腹痛食不化喘息不能行藏氣不足偏風腲腿手足不仁針灸針入三分可灸三壯灸偏風以年為壯二巨虛下廉手太陽下合穴部位在巨虛上廉下三寸外膝眼下九寸兩筋骨罅間舉足取之證治少腹痛飧泄次指間痛唇乾涎出不覺不得汗出毛髮焦脫肉少氣胃中熱不嗜食瀉膿血胸脅少腹痛暴驚狂言非常女子乳癰喉痹胻腫足跗不收針灸針入八分可灸三壯三委陽手少陽下合穴部位膕中外廉兩筋間屈伸取之證治腋下腫痛胸滿膨膨筋急身熱飛屍遁注痿厥不仁小便淋澀針灸針入七分可灸三壯按六腑經脈皆出足之三陽上合於手故手三陽經病自外來者取手之六腧如病在內府當取足下之合穴大腸合於巨虛上廉小腸合於巨虛下廉蓋大腸小腸皆與胃相連接小腸連接於胃之下口幽門曲屈而下故合穴出於巨虛下廉大腸連接於小腸末之闌門迴環而上故合於巨虛上廉三焦下腧出於膕中外廉名曰委陽故閉癃瀉之遺尿補之皆取委陽此本輸之變例也附手足十二經圖十二幅
